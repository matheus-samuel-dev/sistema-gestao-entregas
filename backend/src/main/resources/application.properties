spring.application.name=LogiTrack
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/logitrack}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:logitrack}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:logitrack}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.profiles.default=demo

app.jwt.secret=${LOGITRACK_JWT_SECRET:LogiTrackPortfolioJwtSecretKeyWithAtLeastThirtyTwoCharacters2026}
app.jwt.expiration-ms=${LOGITRACK_JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${LOGITRACK_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost}
app.auth.login-rate-limit.max-attempts=${LOGITRACK_LOGIN_MAX_ATTEMPTS:5}
app.auth.login-rate-limit.window-seconds=${LOGITRACK_LOGIN_WINDOW_SECONDS:900}
app.tracking.location-decimals=${LOGITRACK_TRACKING_LOCATION_DECIMALS:2}

springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=LogiTrack API
info.app.description=Plataforma de gestao logistica

server.error.include-message=never
server.error.include-stacktrace=never
logging.pattern.console={"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}","level":"%p","logger":"%logger{36}","requestId":"%X{requestId:-}","message":"%replace(%m){'"','\\"'}"}%n
