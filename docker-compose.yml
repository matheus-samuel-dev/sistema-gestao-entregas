services:
  db:
    image: postgres:16-alpine
    container_name: logitrack-db
    restart: unless-stopped

    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      POSTGRES_DB: ${POSTGRES_DB:-logitrack}
      POSTGRES_USER: ${POSTGRES_USER:-logitrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-logitrack}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-logitrack} -d ${POSTGRES_DB:-logitrack}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend

    container_name: logitrack-api
    restart: unless-stopped

    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      SERVER_PORT: 8080

      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-demo}

      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-logitrack}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-logitrack}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-logitrack}

      LOGITRACK_JWT_SECRET: ${LOGITRACK_JWT_SECRET:-LogiTrackDockerJwtSecretKeyWithAtLeastThirtyTwoCharacters2026}
      LOGITRACK_JWT_EXPIRATION_MS: ${LOGITRACK_JWT_EXPIRATION_MS:-28800000}
      LOGITRACK_LOGIN_MAX_ATTEMPTS: ${LOGITRACK_LOGIN_MAX_ATTEMPTS:-5}
      LOGITRACK_LOGIN_WINDOW_SECONDS: ${LOGITRACK_LOGIN_WINDOW_SECONDS:-900}

      LOGITRACK_ALLOWED_ORIGINS: "${LOGITRACK_ALLOWED_ORIGINS:-https://gestaoentregas.15-228-45-207.sslip.io,http://localhost:3001,http://localhost:5173}"

    ports:
      - "127.0.0.1:${BACKEND_PORT:-18080}:8080"

    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api

    container_name: logitrack-web
    restart: unless-stopped

    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3001}:80"

    depends_on:
      - backend

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1/health >/dev/null 2>&1 || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data: